<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
        <div>
            <h3 class="m-0 text-xl font-semibold text-surface-900 dark:text-surface-0">Planes de Pago</h3>
            <p class="mb-0 mt-1 text-sm text-surface-400">Configuracion de planes de pension escolar por institucion</p>
        </div>
        <p-button label="Nuevo Plan" icon="pi pi-plus" (onClick)="nuevo()" />
    </div>

    <p-table [value]="planes()" [loading]="loading" dataKey="id"
        [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10,25,50]"
        styleClass="p-datatable-striped">

        <ng-template #header>
            <tr>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                <th pSortableColumn="tipoPeriodo">Periodo <p-sortIcon field="tipoPeriodo" /></th>
                <th pSortableColumn="monto">Monto <p-sortIcon field="monto" /></th>
                <th pSortableColumn="cantidadCuotas">Cuotas <p-sortIcon field="cantidadCuotas" /></th>
                <th>Vencimiento</th>
                <th pSortableColumn="activo">Estado <p-sortIcon field="activo" /></th>
                <th class="w-28">Acciones</th>
            </tr>
        </ng-template>

        <ng-template #body let-p>
            <tr>
                <td class="font-semibold">{{ p.nombre }}</td>
                <td><p-tag [value]="tipoLabel(p.tipoPeriodo)" severity="info" /></td>
                <td>{{ p.monto | currency:p.moneda }}</td>
                <td>{{ p.cantidadCuotas }}x</td>
                <td>Dia {{ p.diaVencimiento }} de cada mes</td>
                <td><p-tag [value]="p.activo ? 'ACTIVO' : 'INACTIVO'" [severity]="estadoSeveridad(p.activo)" /></td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info"
                            pTooltip="Editar" tooltipPosition="top" (onClick)="editar(p)" />
                        <p-button icon="pi pi-ban" [rounded]="true" [text]="true" severity="danger"
                            pTooltip="Desactivar" tooltipPosition="top" (onClick)="confirmarDesactivar(p)"
                            [disabled]="!p.activo" />
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr><td colspan="7" class="py-8 text-center text-surface-400">No hay planes de pago configurados</td></tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="dialogVisible"
    [header]="editMode ? 'Editar Plan' : 'Nuevo Plan'"
    [modal]="true" [style]="{width: '560px'}" [draggable]="false">

    <div class="flex flex-col gap-4 pt-2">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre <span class="text-red-500">*</span></label>
            <input pInputText [(ngModel)]="form.nombre" placeholder="Ej: Pension Escolar 2026" />
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Tipo de periodo</label>
                <p-select class="w-full" [options]="tipoPeriodoOptions" [(ngModel)]="form.tipoPeriodo" optionLabel="label" optionValue="value" appendTo="body" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Moneda</label>
                <input pInputText [(ngModel)]="form.moneda" maxlength="3" placeholder="BOB" />
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Monto <span class="text-red-500">*</span></label>
                <p-inputnumber [(ngModel)]="form.monto" [min]="1" [showButtons]="false" placeholder="Ej: 200" class="w-full" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Cantidad de cuotas <span class="text-red-500">*</span></label>
                <p-inputnumber [(ngModel)]="form.cantidadCuotas" [min]="1" [showButtons]="false" placeholder="Ej: 10" class="w-full" />
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Dia de vencimiento</label>
            <p-inputnumber [(ngModel)]="form.diaVencimiento" [min]="1" [max]="28" [showButtons]="false" placeholder="15" class="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Descripcion</label>
            <textarea pTextarea [(ngModel)]="form.descripcion" rows="3" class="w-full" placeholder="Descripcion del plan..."></textarea>
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="dialogVisible = false" />
        <p-button [label]="editMode ? 'Actualizar' : 'Crear'" icon="pi pi-check" (onClick)="guardar()" />
    </ng-template>
</p-dialog>
