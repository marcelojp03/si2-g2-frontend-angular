<p-toast />

<div class="card">
    <h2 class="text-xl font-semibold text-surface-900 dark:text-surface-0 mb-1">Seguridad — Intentos de Login</h2>
    <p class="text-surface-500 text-sm mb-6">Historial de intentos de acceso al sistema</p>

    <!-- Filtros -->
    <div class="flex flex-wrap gap-3 mb-5 items-end">
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-surface-500">Correo</label>
            <p-iconfield>
                <p-inputicon class="pi pi-at" />
                <input pInputText [(ngModel)]="filtroCorreo" placeholder="Buscar por correo" style="width:220px" />
            </p-iconfield>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-surface-500">Desde</label>
            <input pInputText type="date" [(ngModel)]="filtroFechaDesde" style="width:160px" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-medium text-surface-500">Hasta</label>
            <input pInputText type="date" [(ngModel)]="filtroFechaHasta" style="width:160px" />
        </div>
        <div class="flex items-center gap-2 pb-1">
            <p-checkbox [(ngModel)]="filtroSoloFallos" [binary]="true" inputId="soloFallos" />
            <label for="soloFallos" class="text-sm cursor-pointer select-none">Solo fallos</label>
        </div>
        <div class="flex gap-2 pb-1">
            <p-button label="Buscar" icon="pi pi-search" (onClick)="load()" />
            <p-button label="Limpiar" icon="pi pi-filter-slash" [text]="true" severity="secondary" (onClick)="limpiar()" />
        </div>
    </div>

    <p-table
        [value]="intentos()"
        [loading]="loading"
        [paginator]="true"
        [rows]="20"
        dataKey="id"
        styleClass="p-datatable-sm"
        [sortField]="'fechaIntento'"
        [sortOrder]="-1"
    >
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="fechaIntento">Fecha/Hora <p-sortIcon field="fechaIntento" /></th>
                <th pSortableColumn="correo">Correo <p-sortIcon field="correo" /></th>
                <th>IP</th>
                <th pSortableColumn="exito">Resultado <p-sortIcon field="exito" /></th>
                <th>Motivo fallo</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td class="font-mono text-sm">{{ item.fechaIntento | date:'dd/MM/yyyy HH:mm:ss' }}</td>
                <td>{{ item.correo }}</td>
                <td class="font-mono text-sm">{{ item.ip ?? '—' }}</td>
                <td>
                    <p-tag [severity]="exitoSeverity(item.exito)" [value]="item.exito ? 'EXITOSO' : 'FALLIDO'" />
                </td>
                <td class="text-sm text-surface-600">{{ item.motivoFallo ?? '—' }}</td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr><td colspan="5" class="text-center py-8 text-surface-500">No hay registros para mostrar</td></tr>
        </ng-template>
    </p-table>
</div>
